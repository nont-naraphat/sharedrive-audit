<!doctype html>
<meta charset="utf-8">
<title>Shared Drive Audit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#f6f7f9; --panel:#fff; --line:#e6e8eb; --ink:#1f2328; --mut:#6a737d;
    --accent:#2f7d4f; --accentbg:#e8f3ec; --hover:#f0f2f4; --chip:#eef1f4;
    --folder:#4a7bd0; --file:#8a94a0; --drive:#2f7d4f; --warn:#9a6700;
    --r-organizer:#8250df; --r-fileOrganizer:#0969da; --r-writer:#1a7f37;
    --r-commenter:#9a6700; --r-reader:#6a737d; --r-owner:#8250df;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.45 -apple-system,Segoe UI,Roboto,"Noto Sans Thai",Arial,sans-serif;color:var(--ink);background:var(--bg)}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:650}
  header .meta{color:var(--mut);font-size:12px}
  header .grow{flex:1}
  input[type=search]{border:1px solid var(--line);border-radius:8px;padding:7px 11px;width:210px;font:inherit}
  button{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:7px 13px;font:inherit;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button:hover{background:var(--hover)} button.primary:hover{filter:brightness(1.05)}
  button:disabled{opacity:.55;cursor:default}
  .spin{width:13px;height:13px;border:2px solid #fff6;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:10px 18px;align-items:center}
  .chip{background:var(--chip);border-radius:999px;padding:4px 12px;font-size:12px;color:var(--mut)}
  .chip b{color:var(--ink)}
  .status{font-size:12px;color:var(--mut)}
  .wrap{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 132px)}
  .tree{overflow:auto;padding:8px 10px;background:var(--panel);border-right:1px solid var(--line)}
  .detail{overflow:auto;padding:16px 18px;background:var(--bg)}
  ul.t{list-style:none;margin:0;padding-left:16px}ul.t.root{padding-left:0}
  li.row{margin:0}
  .node{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:6px;cursor:pointer;white-space:nowrap}
  .node:hover{background:var(--hover)}.node.sel{background:var(--accentbg)}
  .tw{width:14px;display:inline-block;text-align:center;color:var(--mut);font-size:11px;user-select:none}
  .ic{width:15px;text-align:center}.nm{overflow:hidden;text-overflow:ellipsis}
  .cnt{color:var(--mut);font-size:11px;margin-left:6px}
  .ic.drive{color:var(--drive)}.ic.folder{color:var(--folder)}.ic.file{color:var(--file)}
  .hidden{display:none}
  .detail h2{font-size:15px;margin:0 0 4px}
  .detail .sub{color:var(--mut);font-size:12px;word-break:break-all;margin-bottom:14px}
  .kv{display:grid;grid-template-columns:120px 1fr;gap:6px 10px;font-size:13px;margin-bottom:18px}
  .kv .k{color:var(--mut)}.kv .v{word-break:break-all}
  .kv .v a{color:var(--folder);text-decoration:none}.kv .v a:hover{text-decoration:underline}
  .mtitle{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin:6px 0 8px;font-weight:650}
  .mrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .mrow .who{overflow:hidden}.mrow .who .em{overflow:hidden;text-overflow:ellipsis}
  .mrow .who .dn{color:var(--mut);font-size:11px}
  .role{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;color:#fff;white-space:nowrap}
  .empty{color:var(--mut);padding:48px 18px;text-align:center}
  .empty button{margin-top:14px}
  .hl{background:#fff2a8;border-radius:3px}
</style>

<header>
  <h1>🗂️ Shared Drive Audit</h1>
  <span class="meta" id="gen"></span>
  <span class="grow"></span>
  <input type="search" id="q" placeholder="ค้นหาชื่อไฟล์ / โฟลเดอร์…">
  <button id="refresh" onclick="doRefresh()"><span id="rico">🔄</span> <span id="rtxt">Sync ตอนนี้</span></button>
  <button id="permbtn" onclick="doPermExport()">🔑 <span id="ptxt">Export Permissions</span></button>
  <button class="primary" onclick="location.href='/api/export'">⬇ Export Excel</button>
</header>

<div class="chips" id="chips"></div>

<div class="wrap">
  <div class="tree" id="tree"><div class="empty">กำลังโหลด…</div></div>
  <div class="detail" id="detail"><div class="empty">เลือกไฟล์หรือโฟลเดอร์เพื่อดูรายละเอียด</div></div>
</div>

<script>
let DATA=null, MEMBERS={}, polling=null;
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const humanSize=n=>{if(!n)return'—';const u=['B','KB','MB','GB','TB'];let f=n,i=0;while(f>=1024&&i<u.length-1){f/=1024;i++}return i===0?n+' B':f.toFixed(2)+' '+u[i]};
const fmtDate=s=>s?new Date(s).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}):'—';
const icon=t=>t==='drive'?'🗄️':t==='folder'?'📁':'📄';

async function boot(){ await refreshStatus(); await loadData(); }

async function refreshStatus(){
  try{
    const s=await (await fetch('/api/status')).json();
    const btn=document.getElementById('refresh');
    if(s.running){
      btn.disabled=true;
      document.getElementById('rico').outerHTML='<span class="spin" id="rico"></span>';
      document.getElementById('rtxt').textContent='กำลัง sync…';
      if(!polling) polling=setInterval(pollDone,3000);
    }else{
      btn.disabled=false;
      const ic=document.getElementById('rico'); if(ic) ic.outerHTML='<span id="rico">🔄</span>';
      document.getElementById('rtxt').textContent='Sync ตอนนี้';
    }
    const g=document.getElementById('gen');
    const sched='ซิงค์อัตโนมัติ '+cronText(s.cron);
    const last=s.last_run?('ล่าสุด '+fmtDate(s.last_run)):'ยังไม่เคยซิงค์';
    const next=s.next_sync?(' · ครั้งถัดไป '+fmtDate(s.next_sync)):'';
    if(s.last_error) g.innerHTML=`<span style="color:#c0392b">ซิงค์ล่าสุด error: ${esc(s.last_error)}</span> · ${esc(sched)}`;
    else g.innerHTML=`⏱️ ${esc(sched)} · ${esc(last)}${esc(next)}`;
    return s;
  }catch(e){ return {}; }
}

function cronText(cron){
  if(!cron) return '';
  const p=cron.trim().split(/\s+/);
  if(p.length===5 && p[2]==='*' && p[3]==='*' && p[4]==='*' && /^\d+$/.test(p[0]) && /^\d+$/.test(p[1])){
    return `ทุกวัน ${p[1].padStart(2,'0')}:${p[0].padStart(2,'0')} น.`;
  }
  return `(${cron})`;
}

async function pollDone(){
  const s=await refreshStatus();
  if(!s.running){ clearInterval(polling); polling=null; await loadData(); }
}

async function doRefresh(){
  const r=await fetch('/api/refresh',{method:'POST'});
  if(r.status===409){ alert('กำลัง sync อยู่แล้ว'); return; }
  if(!r.ok){ const e=await r.json().catch(()=>({})); alert('เริ่มไม่ได้: '+(e.detail||r.status)); return; }
  await refreshStatus();
}

async function loadData(){
  const r=await fetch('/api/audit');
  if(!r.ok){
    document.getElementById('tree').innerHTML=
      '<div class="empty">ยังไม่มีข้อมูล<br>กด <b>Sync ตอนนี้</b> เพื่อดึงข้อมูลครั้งแรก'+
      '<br><button class="primary" onclick="doRefresh()">🔄 Sync เลย</button></div>';
    document.getElementById('chips').innerHTML='';
    return;
  }
  DATA=await r.json(); MEMBERS=DATA.members||{};
  renderChips(); renderTree();
}

function renderChips(){
  const s=DATA.summary||[];
  const f=s.reduce((a,x)=>a+x.files,0), d=s.reduce((a,x)=>a+x.folders,0);
  const sz=DATA.drives.reduce((a,x)=>a+(x.totalSize||0),0);
  document.getElementById('chips').innerHTML=
    `<span class="chip"><b>${s.length}</b> shared drives</span>`+
    `<span class="chip"><b>${f.toLocaleString()}</b> ไฟล์</span>`+
    `<span class="chip"><b>${d.toLocaleString()}</b> โฟลเดอร์</span>`+
    `<span class="chip">รวม <b>${humanSize(sz)}</b></span>`;
}

function nodeHTML(n, driveId){
  driveId = driveId || n.id;
  const kids=n.children&&n.children.length;
  const twist=(n.type==='drive'||n.type==='folder')?`<span class="tw">${kids?'▸':''}</span>`:`<span class="tw"></span>`;
  let cnt=n.type==='drive'?`<span class="cnt">${n.fileCount||0} ไฟล์ · ${n.folderCount||0} โฟลเดอร์</span>`:'';
  const li=document.createElement('li');li.className='row';
  li.innerHTML=`<div class="node"><span class="ic ${n.type}">${icon(n.type)}</span></div>`;
  li.querySelector('.node').insertAdjacentHTML('afterbegin',twist);
  li.querySelector('.node').insertAdjacentHTML('beforeend',`<span class="nm">${esc(n.name)}</span>${cnt}`);
  const nodeEl=li.querySelector('.node');nodeEl._data=n;nodeEl._drive=driveId;
  nodeEl.onclick=e=>{e.stopPropagation();selectNode(nodeEl,n);toggle(li,n);};
  if(kids){const ul=document.createElement('ul');ul.className='t hidden';n.children.forEach(c=>ul.appendChild(nodeHTML(c,driveId)));li.appendChild(ul);}
  return li;
}
function toggle(li,n){if(!(n.children&&n.children.length))return;const ul=li.querySelector('ul'),tw=li.querySelector('.tw');const open=!ul.classList.contains('hidden');ul.classList.toggle('hidden',open);tw.textContent=open?'▸':'▾';}
function renderTree(){const root=document.createElement('ul');root.className='t root';(DATA.drives||[]).forEach(d=>root.appendChild(nodeHTML(d,d.id)));const c=document.getElementById('tree');c.innerHTML='';c.appendChild(root);}

let selEl=null;
function selectNode(el,n){if(selEl)selEl.classList.remove('sel');el.classList.add('sel');selEl=el;renderDetail(n,el._drive);}
function roleBadge(role){const c=(getComputedStyle(document.documentElement).getPropertyValue('--r-'+role)||'#6a737d').trim();return `<span class="role" style="background:${c}">${esc(role)}</span>`;}

function renderDetail(n, driveId){
  const d=document.getElementById('detail');
  let kv=`<div class="kv"><div class="k">ประเภท</div><div class="v">${n.type}</div><div class="k">Path</div><div class="v">${esc(n.path)}</div>`;
  if(n.type!=='drive'){
    kv+=`<div class="k">ขนาด</div><div class="v">${humanSize(n.size)}</div><div class="k">สร้างเมื่อ</div><div class="v">${fmtDate(n.createdTime)}</div><div class="k">แก้ล่าสุด</div><div class="v">${fmtDate(n.modifiedTime)}</div><div class="k">คนแก้ล่าสุด</div><div class="v">${esc(n.lastModifiedBy)||'—'}</div>`;
    if(n.webViewLink)kv+=`<div class="k">ลิงก์</div><div class="v"><a href="${esc(n.webViewLink)}" target="_blank">เปิดใน Drive ↗</a></div>`;
  }else{
    kv+=`<div class="k">ไฟล์ทั้งหมด</div><div class="v">${n.fileCount||0}</div><div class="k">โฟลเดอร์ย่อย</div><div class="v">${n.folderCount||0}</div><div class="k">ขนาดรวม</div><div class="v">${humanSize(n.totalSize)}</div><div class="k">สร้างเมื่อ</div><div class="v">${fmtDate(n.createdTime)}</div><div class="k">ไล่ไฟล์โดย</div><div class="v">${esc(n.crawledAs)||'—'}</div>`;
  }
  kv+=`</div>`;
  d.innerHTML=`<h2>${icon(n.type)} ${esc(n.name)}</h2><div class="sub">${esc(n.id)}</div>${kv}<div id="perms"></div>`;

  const pv=document.getElementById('perms');
  if(n.type==='drive'){
    const order={organizer:0,fileOrganizer:1,writer:2,commenter:3,reader:4};
    const ms=(MEMBERS[n.id]||[]).filter(m=>!m.deleted).sort((a,b)=>(order[a.role]??9)-(order[b.role]??9));
    let h=`<div class="mtitle">Members / Permission (${ms.length})</div>`;
    if(!ms.length)h+=`<div class="sub">ไม่มีข้อมูล member</div>`;
    ms.forEach(m=>{h+=`<div class="mrow"><div class="who"><div class="em">${esc(m.emailAddress||m.domain||m.type)}</div>${m.displayName?`<div class="dn">${esc(m.displayName)}</div>`:''}</div>${roleBadge(m.role||'')}</div>`;});
    pv.innerHTML=h;
  }else{
    pv.innerHTML=`<div class="mtitle">สิทธิ์การเข้าถึง</div><div class="sub">⏳ กำลังโหลด…</div>`;
    loadItemPerms(n.id, driveId, pv);
  }
}

async function loadItemPerms(itemId, driveId, pv){
  try{
    const r=await fetch(`/api/permissions?item=${encodeURIComponent(itemId)}&drive=${encodeURIComponent(driveId)}`);
    if(!r.ok){pv.innerHTML=`<div class="mtitle">สิทธิ์การเข้าถึง</div><div class="sub">โหลดไม่ได้</div>`;return;}
    const data=await r.json();
    const ps=data.permissions||[];
    let h=`<div class="mtitle">สิทธิ์การเข้าถึง (${ps.length})</div>`;
    if(!ps.length)h+=`<div class="sub">ใช้สิทธิ์ตาม drive</div>`;
    ps.forEach(p=>{
      const ext=p.external?`<span class="role" style="background:#c0392b;margin-left:4px">นอกองค์กร</span>`:'';
      const inh=p.inherited?'':`<span class="role" style="background:#0969da;margin-left:4px">แชร์ตรง</span>`;
      h+=`<div class="mrow"><div class="who"><div class="em">${esc(p.email||p.name||p.memberType)}</div><div class="dn">${esc(p.roleTh)} · ${esc(p.memberType)}</div></div><div>${roleBadge(p.role||'')}${inh}${ext}</div></div>`;
    });
    pv.innerHTML=h;
  }catch(e){pv.innerHTML=`<div class="mtitle">สิทธิ์การเข้าถึง</div><div class="sub">โหลดไม่ได้</div>`;}
}

const q=document.getElementById('q');let tmr;
q.oninput=()=>{clearTimeout(tmr);tmr=setTimeout(runSearch,180);};
function runSearch(){
  const term=q.value.trim().toLowerCase();
  const rows=document.querySelectorAll('#tree li.row');
  if(!term){rows.forEach(li=>{li.classList.remove('hidden');li.querySelectorAll('.nm').forEach(x=>x.innerHTML=x.textContent);const ul=li.querySelector(':scope>ul');if(ul){ul.classList.add('hidden');const tw=li.querySelector('.tw');if(tw&&tw.textContent)tw.textContent='▸';}});return;}
  const match=li=>{
    const nm=li.querySelector(':scope>.node .nm');const name=nm.textContent.toLowerCase();
    let self=name.includes(term),childMatch=false;
    li.querySelectorAll(':scope>ul>li.row').forEach(c=>{if(match(c))childMatch=true;});
    const vis=self||childMatch;li.classList.toggle('hidden',!vis);
    nm.innerHTML=self?nm.textContent.replace(new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<span class="hl">$1</span>'):nm.textContent;
    const ul=li.querySelector(':scope>ul');if(ul){ul.classList.toggle('hidden',!childMatch);const tw=li.querySelector(':scope>.node .tw');if(tw&&tw.textContent)tw.textContent=childMatch?'▾':'▸';}
    return vis;
  };
  document.querySelectorAll('#tree>ul.root>li.row').forEach(match);
}

boot();

let permPoll=null;
async function doPermExport(){
  const s=await (await fetch('/api/perm-status')).json();
  if(s.running){ pollPerm(); return; }
  if(s.hasFile && !confirm('มีไฟล์ permissions.csv อยู่แล้ว — สร้างใหม่? (ใช้เวลานานกับระบบใหญ่)')){
    location.href='/api/export-permissions/download'; return;
  }
  const r=await fetch('/api/export-permissions',{method:'POST'});
  if(r.status===409){ pollPerm(); return; }
  if(!r.ok){ alert('เริ่มไม่ได้'); return; }
  pollPerm();
}
function setPermBtn(txt,dis){document.getElementById('ptxt').textContent=txt;document.getElementById('permbtn').disabled=!!dis;}
async function pollPerm(){
  setPermBtn('กำลังดึง permission…',true);
  if(permPoll) clearInterval(permPoll);
  permPoll=setInterval(async()=>{
    const s=await (await fetch('/api/perm-status')).json();
    if(s.running){ setPermBtn(`ดึงแล้ว ${s.rows.toLocaleString()} แถว…`,true); }
    else{
      clearInterval(permPoll); permPoll=null;
      setPermBtn('Export Permissions',false);
      if(s.last_error){ alert('error: '+s.last_error); }
      else if(s.hasFile){ if(confirm(`เสร็จ ${s.rows.toLocaleString()} แถว — ดาวน์โหลดเลยไหม?`)) location.href='/api/export-permissions/download'; }
    }
  },3000);
}
</script>
